<script id="site-mode-script">
(() => {
  const body = document.body;
  if (!body) {
    return;
  }

  const validModes = ['bike', 'drive'];
  const storedMode = window.localStorage.getItem('site-mode');
  const url = new URL(window.location.href);
  const queryMode = url.searchParams.get('mode');
  const bodyMode = body.dataset.siteMode;
  const isShared = body.dataset.sharedPage === 'true';

  let activeMode = validModes.includes(bodyMode) ? bodyMode : 'bike';

  if (isShared) {
    if (validModes.includes(queryMode)) {
      activeMode = queryMode;
    }
    else if (validModes.includes(storedMode)) {
      activeMode = storedMode;
    }
  }

  if (!validModes.includes(activeMode)) {
    activeMode = 'bike';
  }

  body.dataset.siteMode = activeMode;
  body.dataset.theme = activeMode;
  window.localStorage.setItem('site-mode', activeMode);

  const applyHref = (selector) => {
    const element = document.querySelector(selector);
    if (!element) {
      return;
    }

    element.href = activeMode === 'drive' ? element.dataset.driveHref : element.dataset.bikeHref;
  };

  const syncModePanels = () => {
    document.querySelectorAll('[data-mode-panel]').forEach((panel) => {
      panel.hidden = panel.dataset.modePanel !== activeMode;
    });
  };

  const syncModeMenus = () => {
    document.querySelectorAll('[data-mode-nav]').forEach((menu) => {
      const isActive = menu.dataset.modeNav === activeMode;
      menu.hidden = !isActive;
      menu.setAttribute('aria-hidden', isActive ? 'false' : 'true');
    });
  };

  const logo = document.querySelector('.site-brand__logo');
  if (logo) {
    logo.src = activeMode === 'drive' ? logo.dataset.driveSrc : logo.dataset.bikeSrc;
    logo.alt = activeMode === 'drive' ? 'Driveshop logo' : 'Bikeshop logo';
  }

  const heroImage = document.querySelector('.home-hero__image');
  if (heroImage) {
    heroImage.src = activeMode === 'drive' ? heroImage.dataset.driveSrc : heroImage.dataset.bikeSrc;
  }

  applyHref('.site-brand');
  applyHref('.site-nav__contact');
  applyHref('.site-footer__link--contact');
  applyHref('.site-footer__link--merken');

  const heroCopy = document.querySelector('.page-copy--hero');
  if (heroCopy) {
    const nextCopy = activeMode === 'drive' ? heroCopy.dataset.driveCopy : heroCopy.dataset.bikeCopy;
    const paragraph = document.createElement('p');
    paragraph.textContent = nextCopy || '';
    heroCopy.replaceChildren(paragraph);
  }

  const modeToggle = document.querySelector('.site-nav__mode-toggle');
  if (modeToggle) {
    const nextLabel = activeMode === 'drive' ? modeToggle.dataset.driveLabel : modeToggle.dataset.bikeLabel;
    const modeText = modeToggle.querySelector('.site-nav__mode-text');

    modeToggle.href = activeMode === 'drive' ? modeToggle.dataset.driveHref : modeToggle.dataset.bikeHref;
    modeToggle.dataset.modeState = activeMode;

    if (modeText) {
      modeText.textContent = nextLabel;
    }
  }

  const menu = document.querySelector('.site-nav__menu');
  const menuToggle = document.querySelector('.site-nav__menu-toggle');
  let closeMenuTimer = null;
  const clearCloseMenuTimer = () => {
    if (closeMenuTimer !== null) {
      window.clearTimeout(closeMenuTimer);
      closeMenuTimer = null;
    }
  };

  const applyMenuState = (state) => {
    if (!menu || !menuToggle) {
      return;
    }

    menu.dataset.menuState = state;
    menu.setAttribute('aria-hidden', state === 'open' || state === 'opening' ? 'false' : 'true');
  };

  const finishCloseMenu = () => {
    if (!menu || !menuToggle) {
      return;
    }

    clearCloseMenuTimer();
    menu.hidden = true;
    applyMenuState('closed');
    menuToggle.setAttribute('aria-expanded', 'false');
  };

  const closeMenu = () => {
    if (!menu || !menuToggle || menu.hidden) {
      return;
    }

    clearCloseMenuTimer();
    applyMenuState('closing');
    menuToggle.setAttribute('aria-expanded', 'false');
    body.classList.remove('site-menu-open');
    closeMenuTimer = window.setTimeout(finishCloseMenu, 220);
  };

  const openMenu = () => {
    if (!menu || !menuToggle) {
      return;
    }

    clearCloseMenuTimer();
    menu.hidden = false;
    applyMenuState('opening');
    menuToggle.setAttribute('aria-expanded', 'true');
    body.classList.add('site-menu-open');
    window.requestAnimationFrame(() => {
      window.requestAnimationFrame(() => {
        applyMenuState('open');
      });
    });
  };

  if (menu && menuToggle) {
    applyMenuState(menu.hidden ? 'closed' : 'open');

    menu.addEventListener('transitionend', (event) => {
      const menuPanel = menu.querySelector('.site-nav__menu-panel');
      if (event.target !== menu && event.target !== menuPanel) {
        return;
      }

      if (menu.dataset.menuState === 'closing') {
        finishCloseMenu();
      }
    });

    menuToggle.addEventListener('click', () => {
      if (menu.hidden) {
        openMenu();
      }
      else {
        closeMenu();
      }
    });

    document.addEventListener('click', (event) => {
      if (menu.hidden) {
        return;
      }

      if (menu.contains(event.target) || menuToggle.contains(event.target)) {
        return;
      }

      closeMenu();
    });

    menu.addEventListener('click', (event) => {
      if (event.target.closest('.site-nav__menu-link')) {
        closeMenu();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        closeMenu();
      }
    });
  }
  syncModePanels();
  syncModeMenus();
})();
</script>
