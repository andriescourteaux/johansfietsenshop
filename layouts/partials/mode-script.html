<script id="site-mode-script">
(() => {
  const body = document.body;
  if (!body) {
    return;
  }

  const validModes = ['bike', 'drive'];
  const storedMode = window.localStorage.getItem('site-mode');
  const url = new URL(window.location.href);
  const queryMode = url.searchParams.get('mode');
  const bodyMode = body.dataset.siteMode;
  const isShared = body.dataset.sharedPage === 'true';
  const isHomePage = body.classList.contains('page--home');
  const reducedMotionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');

  let activeMode = validModes.includes(bodyMode) ? bodyMode : 'bike';
  let modeSwitchTimer = null;
  let parallaxFrame = null;
  let closeMenuTimer = null;

  if (isShared) {
    if (validModes.includes(queryMode)) {
      activeMode = queryMode;
    }
    else if (validModes.includes(storedMode)) {
      activeMode = storedMode;
    }
  }

  if (!validModes.includes(activeMode)) {
    activeMode = 'bike';
  }

  const logo = document.querySelector('.site-brand__logo');
  const heroImage = document.querySelector('.home-hero__image');
  const heroCopy = document.querySelector('.page-copy--hero');
  const modeToggle = document.querySelector('.site-nav__mode-toggle');
  const menu = document.querySelector('.site-nav__menu');
  const menuToggle = document.querySelector('.site-nav__menu-toggle');
  const parallaxImage = document.querySelector('[data-hero-parallax]');
  const siteHeader = document.querySelector('[data-site-header]');

  const applyHref = (selector) => {
    const element = document.querySelector(selector);
    if (!element) {
      return;
    }

    element.href = activeMode === 'drive' ? element.dataset.driveHref : element.dataset.bikeHref;
  };

  const syncModePanels = () => {
    document.querySelectorAll('[data-mode-panel]').forEach((panel) => {
      panel.hidden = panel.dataset.modePanel !== activeMode;
    });
  };

  const syncModeMenus = () => {
    document.querySelectorAll('[data-mode-nav]').forEach((menuList) => {
      const isActive = menuList.dataset.modeNav === activeMode;
      menuList.hidden = !isActive;
      menuList.setAttribute('aria-hidden', isActive ? 'false' : 'true');
    });
  };

  const persistModeUrl = () => {
    if (!isShared || !isHomePage) {
      return;
    }

    const nextUrl = new URL(window.location.href);
    nextUrl.searchParams.set('mode', activeMode);
    window.history.replaceState({}, '', nextUrl);
  };

  const clearModeSwitchTimer = () => {
    if (modeSwitchTimer !== null) {
      window.clearTimeout(modeSwitchTimer);
      modeSwitchTimer = null;
    }
  };

  const startModeSwitchAnimation = () => {
    if (!isHomePage || reducedMotionQuery.matches) {
      return;
    }

    clearModeSwitchTimer();
    body.classList.remove('site-mode-switching');
    window.requestAnimationFrame(() => {
      body.classList.add('site-mode-switching');
      modeSwitchTimer = window.setTimeout(() => {
        body.classList.remove('site-mode-switching');
        modeSwitchTimer = null;
      }, 240);
    });
  };

  const clearCloseMenuTimer = () => {
    if (closeMenuTimer !== null) {
      window.clearTimeout(closeMenuTimer);
      closeMenuTimer = null;
    }
  };

  const applyMenuState = (state) => {
    if (!menu || !menuToggle) {
      return;
    }

    menu.dataset.menuState = state;
    menu.setAttribute('aria-hidden', state === 'open' || state === 'opening' ? 'false' : 'true');
  };

  const finishCloseMenu = () => {
    if (!menu || !menuToggle) {
      return;
    }

    clearCloseMenuTimer();
    menu.hidden = true;
    applyMenuState('closed');
    menuToggle.setAttribute('aria-expanded', 'false');
    body.classList.remove('site-menu-open');
  };

  const closeMenu = () => {
    if (!menu || !menuToggle || menu.hidden) {
      return;
    }

    clearCloseMenuTimer();
    applyMenuState('closing');
    menuToggle.setAttribute('aria-expanded', 'false');
    body.classList.remove('site-menu-open');
    closeMenuTimer = window.setTimeout(finishCloseMenu, 220);
  };

  const openMenu = () => {
    if (!menu || !menuToggle) {
      return;
    }

    clearCloseMenuTimer();
    menu.hidden = false;
    applyMenuState('closed');
    menuToggle.setAttribute('aria-expanded', 'true');
    body.classList.add('site-menu-open');
    window.requestAnimationFrame(() => {
      applyMenuState('opening');
      window.requestAnimationFrame(() => {
        applyMenuState('open');
      });
    });
  };

  const updateHeroParallax = () => {
    if (!parallaxImage) {
      return;
    }

    if (reducedMotionQuery.matches) {
      parallaxImage.style.removeProperty('transform');
      return;
    }

    const hero = parallaxImage.closest('.shared-hero');
    if (!hero) {
      return;
    }

    const heroRect = hero.getBoundingClientRect();
    const viewportCenter = window.innerHeight * 0.5;
    const heroCenter = heroRect.top + (heroRect.height * 0.5);
    const offset = Math.max(-100, Math.min(100, (viewportCenter - heroCenter) * 0.14));

    parallaxImage.style.transform = `translate3d(0, ${offset.toFixed(2)}px, 0) scale(1.05)`;
  };

  const syncScrolledHeader = () => {
    if (!siteHeader) {
      return;
    }

    body.classList.toggle('site-header-scrolled', window.scrollY > 12);
  };

  const requestHeroParallax = () => {
    if (!parallaxImage || reducedMotionQuery.matches) {
      if (parallaxImage) {
        parallaxImage.style.removeProperty('transform');
      }
      return;
    }

    if (parallaxFrame !== null) {
      return;
    }

    parallaxFrame = window.requestAnimationFrame(() => {
      parallaxFrame = null;
      updateHeroParallax();
    });
  };

  const syncModeContent = () => {
    body.dataset.siteMode = activeMode;
    body.dataset.theme = activeMode;
    window.localStorage.setItem('site-mode', activeMode);
    persistModeUrl();

    if (logo) {
      logo.src = activeMode === 'drive' ? logo.dataset.driveSrc : logo.dataset.bikeSrc;
      logo.alt = activeMode === 'drive' ? 'Driveshop logo' : 'Bikeshop logo';
    }

    if (heroImage) {
      heroImage.src = activeMode === 'drive' ? heroImage.dataset.driveSrc : heroImage.dataset.bikeSrc;
      requestHeroParallax();
    }

    applyHref('.site-brand');
    applyHref('.site-footer__link--contact');
    applyHref('.site-footer__link--merken');

    if (heroCopy) {
      const nextCopy = activeMode === 'drive' ? heroCopy.dataset.driveCopy : heroCopy.dataset.bikeCopy;
      const paragraph = document.createElement('p');
      paragraph.textContent = nextCopy || '';
      heroCopy.replaceChildren(paragraph);
    }

    if (modeToggle) {
      const nextLabel = activeMode === 'drive' ? modeToggle.dataset.driveLabel : modeToggle.dataset.bikeLabel;
      const modeText = modeToggle.querySelector('.site-nav__mode-text');

      modeToggle.href = activeMode === 'drive' ? modeToggle.dataset.driveHref : modeToggle.dataset.bikeHref;
      modeToggle.dataset.modeState = activeMode;

      if (modeText) {
        modeText.textContent = nextLabel;
      }
    }

    syncModePanels();
    syncModeMenus();
  };

  const switchMode = (nextMode) => {
    if (!validModes.includes(nextMode) || nextMode === activeMode) {
      return;
    }

    activeMode = nextMode;
    closeMenu();
    syncModeContent();
    startModeSwitchAnimation();
  };

  if (menu && menuToggle) {
    applyMenuState(menu.hidden ? 'closed' : 'open');

    menu.addEventListener('transitionend', (event) => {
      const menuPanel = menu.querySelector('.site-nav__menu-panel');
      if (event.target !== menu && event.target !== menuPanel) {
        return;
      }

      if (menu.dataset.menuState === 'closing') {
        finishCloseMenu();
      }
    });

    menuToggle.addEventListener('click', () => {
      if (menu.hidden) {
        openMenu();
      }
      else {
        closeMenu();
      }
    });

    document.addEventListener('click', (event) => {
      if (menu.hidden) {
        return;
      }

      if (menu.contains(event.target) || menuToggle.contains(event.target)) {
        return;
      }

      closeMenu();
    });

    menu.addEventListener('click', (event) => {
      if (event.target.closest('.site-nav__menu-link')) {
        closeMenu();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        closeMenu();
      }
    });
  }

  if (modeToggle && isShared && isHomePage) {
    modeToggle.addEventListener('click', (event) => {
      event.preventDefault();
      switchMode(activeMode === 'drive' ? 'bike' : 'drive');
    });
  }

  window.addEventListener('scroll', syncScrolledHeader, { passive: true });
  window.addEventListener('resize', syncScrolledHeader);

  if (parallaxImage) {
    window.addEventListener('scroll', requestHeroParallax, { passive: true });
    window.addEventListener('resize', requestHeroParallax);

    if (typeof reducedMotionQuery.addEventListener === 'function') {
      reducedMotionQuery.addEventListener('change', requestHeroParallax);
    }
    else if (typeof reducedMotionQuery.addListener === 'function') {
      reducedMotionQuery.addListener(requestHeroParallax);
    }
  }

  syncModeContent();
  syncScrolledHeader();
  requestHeroParallax();
})();
</script>
