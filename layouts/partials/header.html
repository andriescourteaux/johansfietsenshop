{{- $siteMode := partial "site-mode.html" . -}}
<header class="site-header{{ if .IsHome }} site-header--overlay{{ end }}" data-site-mode="{{ $siteMode.mode }}">
    <div class="container site-header__inner">
        <a class="site-brand" href="{{ $siteMode.homeHref }}" data-bike-href="{{ $siteMode.homeBikeHref }}" data-drive-href="{{ $siteMode.homeDriveHref }}">
            <img class="site-brand__logo" src="{{ $siteMode.logoPath }}" data-bike-src="{{ $siteMode.logoBikePath }}" data-drive-src="{{ $siteMode.logoDrivePath }}" alt="{{ if $siteMode.isDrive }}Johan's Driveshop{{ else }}Bikeshop{{ end }} logo">
        </a>
        <nav class="site-nav" aria-label="Hoofdnavigatie">
            <a class="site-nav__item site-nav__contact" href="{{ $siteMode.contactHref }}" data-bike-href="{{ $siteMode.contactBikeHref }}" data-drive-href="{{ $siteMode.contactDriveHref }}">Contact</a>
            <a class="site-nav__item site-nav__switch" href="{{ $siteMode.switchHref }}" data-bike-href="{{ $siteMode.switchBikeHref }}" data-drive-href="{{ $siteMode.switchDriveHref }}" data-bike-label="{{ $siteMode.switchBikeLabel }}" data-drive-label="{{ $siteMode.switchDriveLabel }}">{{ $siteMode.switchLabel }}</a>
            <div class="site-nav__menu-shell">
                <button class="site-nav__menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav-menu">
                    <span class="site-nav__menu-label">Menu</span>
                    <span class="site-nav__menu-icon" aria-hidden="true">
                        <span></span>
                        <span></span>
                        <span></span>
                    </span>
                </button>
                <div id="site-nav-menu" class="site-nav__menu" hidden>
                    <div class="site-nav__menu-panel">
                        <ul class="site-nav__menu-list" data-mode-nav="bike"{{ if $siteMode.isDrive }} hidden{{ end }}>
                            {{ range $siteMode.bikeMenuItems }}
                            <li><a class="site-nav__menu-link site-nav__menu-link--{{ .key }}" href="{{ .href }}">{{ .title }}</a></li>
                            {{ end }}
                        </ul>
                        <ul class="site-nav__menu-list" data-mode-nav="drive"{{ if not $siteMode.isDrive }} hidden{{ end }}>
                            {{ range $siteMode.driveMenuItems }}
                            <li><a class="site-nav__menu-link site-nav__menu-link--{{ .key }}" href="{{ .href }}">{{ .title }}</a></li>
                            {{ end }}
                        </ul>
                    </div>
                </div>
            </div>
        </nav>
    </div>
</header>
