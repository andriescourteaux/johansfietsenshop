{{ with index .Site.Data "promo-popup" }}
{{ if (index . "enabled") }}
{{- $image := index . "image" -}}
{{- $alt := index . "alt" -}}
{{- $sessionKey := printf "promo-popup-%s" (md5 (printf "%s|%s" $image $alt)) -}}
<div class="promo-popup" data-promo-popup="root" data-promo-popup-key="{{ $sessionKey }}" hidden>
    <button class="promo-popup__backdrop" type="button" aria-label="Sluit promotie" data-promo-popup="backdrop"></button>
    <div class="promo-popup__dialog" role="dialog" aria-modal="true" aria-label="Promotie">
        <button class="promo-popup__close" type="button" aria-label="Sluit promotie" data-promo-popup="close">&times;</button>
        <img class="promo-popup__image" src="{{ $image }}" alt="{{ $alt }}" loading="eager" decoding="async">
    </div>
</div>
{{ end }}
{{ end }}
